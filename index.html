<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Farewell CCMC - 专属纪念</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- 绘制彩带雨效果的画布 -->
    <canvas id="confetti-canvas"></canvas>

    <!-- 移动端柔和背景光晕 -->
    <div class="bg-glow"></div>

    <!-- 背景音乐 -->
    <audio id="bg-music" loop>
        <source src="farewell.mp3" type="audio/mp3">
    </audio>

    <!-- 1. 手机左上角返回按钮（默认隐藏，进入贺卡后显示） -->
    <div id="back-btn" class="back-btn hide">
        <span class="back-icon">⬅️</span>
    </div>

    <!-- 2. 手机右上角音乐按钮（已放大 1.25 倍） -->
    <div id="music-btn" class="music-btn hide">
        <span class="music-icon">🎵</span>
    </div>

    <!-- 大图查看弹窗 (Lightbox) -->
    <div id="lightbox" class="lightbox hide">
        <img id="lightbox-img" src="" alt="大图查看">
    </div>

    <!-- ==========================================
       一、 手机封面入口页（单列布局）
       ========================================== -->
    <div id="welcome-screen" class="welcome-screen">
        <div class="welcome-content">
            <div class="envelope-wrapper">
                <div class="envelope-icon">✉️</div>
            </div>
            <h2 id="welcome-title">加载中...</h2>
            <p class="welcome-desc">为您准备了一份专属的记忆贺卡</p>
            <button id="open-btn" class="open-btn">点击开启惊喜</button>
        </div>
    </div>

    <!-- ==========================================
       二、 沉浸式移动贺卡页（纯手机单列纵向流排版）
       ========================================== -->
    <div id="card-screen" class="mobile-page-container hide">
        
        <!-- 1. 信纸模版（写信区域） -->
        <div class="letter-paper">
            <div class="paper-header-line"></div>
            <h2 class="salutation">亲爱的 <span id="friend-name"></span>：</h2>
            <!-- 下方已默认换成 Tom -->
            <p id="friend-role" class="role-tag">Tom</p>
            
            <!-- 信件正文 -->
            <div id="letter-content" class="letter-text"></div>
        </div>

        <!-- 2. 照片滑动区域（支持手势左右滑动，预设了 3 张测试照片） -->
        <div class="photo-section">
            <h3 class="section-title">✨ 我们的精彩瞬间 (左右滑动)</h3>
            
            <div class="carousel-container">
                <div id="carousel-track" class="carousel-track">
                    <!-- 照片由 JS 动态加载 -->
                </div>
            </div>
            
            <!-- 幻灯片指示点 -->
            <div id="carousel-dots" class="carousel-dots"></div>
        </div>

        <!-- 3. 时间胶囊板块 (7月31号 晚上11点59分 自动解锁) -->
        <div class="capsule-section">
            <h3 class="section-title">⌛ 专属时间胶囊</h3>
            <div id="capsule-container" class="capsule-card">
                <!-- 由 Javascript 自动生成锁和倒计时 -->
            </div>
        </div>

        <!-- 4. 匿名留言墙板块 (朋友留言直接发到你的邮箱，别人看不到) -->
        <div class="message-wall-section">
            <h3 class="section-title">🤫 匿名悄悄话墙</h3>
            <div class="message-wall-card">
                <p class="wall-desc">有什么想对 Tom 说的悄悄话吗？写在下面提交，Tom 就能在邮箱里收到你的留言，其他人是看不见的哦。</p>
                
                <!-- 💡 提示：你可以把下面的 tomloh1110@gmail.com 换成你的任意接收邮箱 -->
                <form action="https://formsubmit.co/tomloh1110@gmail.com" method="POST" class="message-form">
                    <!-- 防垃圾邮件机器人机制 -->
                    <input type="text" name="_honey" style="display:none">
                    <!-- 关闭验证码机制，提升手机用户的提交体验 -->
                    <input type="hidden" name="_captcha" value="false">
                    <!-- 动态设置提交成功后返回当前专属页面 -->
                    <input type="hidden" id="redirect-url" name="_next" value="">
                    
                    <textarea name="悄悄话" class="message-input" placeholder="写下你想说的话..." required></textarea>
                    <button type="submit" class="submit-msg-btn">发送悄悄话给 Tom</button>
                </form>
            </div>
        </div>

        <!-- 5. 最后的专属祝福语 -->
        <div class="blessing-section">
            <div class="blessing-card">
                <span class="quote-mark">“</span>
                <!-- 页脚寄语已修改 -->
                <p id="blessing-text" class="blessing-para"></p>
                <span class="quote-mark text-right">”</span>
            </div>
        </div>

        <!-- 6. 底部签名区（已修改文案） -->
        <div class="footer-sign">
            <p>谢谢你愿意看到这里，祝你前途似锦，愿神的平安与你同在</p>
            <p class="sign-name">—— Tom 仅此，有缘再见。</p>
        </div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
