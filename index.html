<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Farewell CCMC - 专属纪念</title>
    <!-- 注意：为了适配 Clean URL，这里必须使用以仓库名开头的绝对路径 -->
    <link rel="stylesheet" href="/Farewell_CCMC/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <canvas id="confetti-canvas"></canvas>
    <div class="bg-glow"></div>

    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
    </audio>

    <div id="music-btn" class="music-btn hide">
        <span class="music-icon">🎵</span>
    </div>

    <div id="lightbox" class="lightbox hide">
        <img id="lightbox-img" src="" alt="大图查看">
    </div>

    <!-- 1. 封面入口页 -->
    <div id="welcome-screen" class="welcome-screen">
        <div class="welcome-content">
            <div class="envelope-wrapper">
                <div class="envelope-icon">✉️</div>
            </div>
            <h2 id="welcome-title">加载中...</h2>
            <p class="welcome-desc">为您准备了一份专属的记忆贺卡</p>
            <button id="open-btn" class="open-btn">点击开启惊喜</button>
        </div>
    </div>

    <!-- 2. 全屏沉浸式移动贺卡页 -->
    <div id="card-screen" class="mobile-page-container hide">
        
        <div class="letter-paper">
            <div class="paper-header-line"></div>
            <h2 class="salutation">亲爱的 <span id="friend-name"></span>：</h2>
            <p id="friend-role" class="role-tag"></p>
            <div id="letter-content" class="letter-text"></div>
        </div>

        <div class="photo-section">
            <h3 class="section-title">✨ 我们的精彩瞬间 (左右滑动)</h3>
            <div class="carousel-container">
                <div id="carousel-track" class="carousel-track">
                    <!-- 照片由 JS 动态加载 -->
                </div>
            </div>
            <div id="carousel-dots" class="carousel-dots"></div>
        </div>

        <div class="blessing-section">
            <div class="blessing-card">
                <span class="quote-mark">“</span>
                <p id="blessing-text" class="blessing-para"></p>
                <span class="quote-mark text-right">”</span>
            </div>
        </div>

        <div class="footer-sign">
            <p>愿你前途似锦，常回家看看</p>
            <p class="sign-name">—— CCMC 全体伙伴 敬上</p>
        </div>
        
    </div>

    <!-- 注意：为了适配 Clean URL，这里必须使用绝对路径 -->
    <script src="/Farewell_CCMC/script.js"></script>
</body>
</html>
