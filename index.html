<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Farewell CCMC - 专属纪念</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- 绘制彩带雨效果的画布 -->
    <canvas id="confetti-canvas"></canvas>

    <!-- 移动端柔和背景光晕 -->
    <div class="bg-glow"></div>

    <!-- 背景音乐：已绑定你的专属音频文件 farewell.mp3 -->
    <audio id="bg-music" loop>
        <source src="farewell.mp3" type="audio/mp3">
    </audio>

    <!-- 手机左上角扁平化返回按钮 -->
    <div id="back-btn" class="back-btn hide">
        <span class="back-icon">⬅️</span>
    </div>

    <!-- 手机右上角扁平化音乐按钮 -->
    <div id="music-btn" class="music-btn hide">
        <span class="music-icon">🎵</span>
    </div>

    <!-- ==========================================
       一、 手机封面入口页
       ========================================== -->
    <div id="welcome-screen" class="welcome-screen">
        <div class="welcome-content">
            <div class="envelope-wrapper">
                <div class="envelope-icon">✉️</div>
            </div>
            <h2 id="welcome-title">加载中...</h2>
            <p class="welcome-desc">为您准备了一份专属的记忆贺卡</p>
            <button id="open-btn" class="open-btn">点击开启惊喜</button>
        </div>
    </div>

    <!-- ==========================================
       二、 沉浸式移动贺卡页（单列纵向流）
       ========================================== -->
    <div id="card-screen" class="mobile-page-container hide">
        
        <!-- 1. 信纸模版（写信区域） -->
        <div class="letter-paper">
            <div class="paper-header-line"></div>
            <h2 class="salutation">亲爱的 <span id="friend-name"></span>：</h2>
            <p id="friend-role" class="role-tag">Tom</p>
            
            <!-- 信件正文 -->
            <div id="letter-content" class="letter-text"></div>
        </div>

        <!-- 2. 时间胶囊板块 (7月31号 晚上11点59分 自动解锁) -->
        <div class="capsule-section">
            <h3 class="section-title">⌛ 专属时间胶囊</h3>
            <div id="capsule-container" class="capsule-card">
                <!-- 由 JS 自动生成锁和倒计时 -->
            </div>
        </div>

        <!-- 3. 匿名留言墙板块（已接入你的专属谷歌数据库！） -->
        <div class="message-wall-section">
            <h3 class="section-title">🤫 匿名悄悄话墙</h3>
            <div class="message-wall-card">
                <p class="wall-desc">有什么想对 Tom 说的悄悄话吗？写在下面提交，Tom 就能在谷歌表格里看到你的留言，其他人是看不见的哦。</p>
                
                <form action="https://script.google.com/macros/s/AKfycbxMLO7yVcuhA8_tfxP6v13CPQDChqjYj0isn-DSEPXxI0oxfuBBNmxv4YOOunkqDRSq/exec" method="POST" class="message-form">
                    <!-- 自动记录发信人中文名字的隐藏字段 -->
                    <input type="hidden" name="friend_name" id="hidden-friend-name" value="">
                    
                    <textarea name="message" class="message-input" placeholder="写下你想说的话..." required></textarea>
                    <button type="submit" class="submit-msg-btn">发送匿名邮件</button>
                </form>
            </div>
        </div>

        <!-- 4. 最后的专属祝福语 -->
        <div class="blessing-section">
            <div class="blessing-card">
                <span class="quote-mark">“</span>
                <p id="blessing-text" class="blessing-para"></p>
                <span class="quote-mark text-right">”</span>
            </div>
        </div>

        <!-- 5. 底部签名区 -->
        <div class="footer-sign">
            <p>谢谢你愿意看到这里，祝你前途似锦，愿神的平安与你同在</p>
            <p class="sign-name">—— Tom 仅此，有缘再见。</p>
        </div>
        
    </div>

    <script src="script.js"></script>
</body>
</html>
