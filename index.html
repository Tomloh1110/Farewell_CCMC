<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- 针对手机端特别锁定了缩放，并适配了刘海屏的安全区域 (viewport-fit=cover) -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Farewell CCMC - 专属纪念</title>
    <!-- 引入样式 -->
    <link rel="stylesheet" href="style.css">
    <!-- 引入适合手机阅读的谷歌字体 -->
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
</head>
<body>

    <!-- 绘制彩带雨效果的画布 -->
    <canvas id="confetti-canvas"></canvas>

    <!-- 背景渐变光晕 -->
    <div class="bg-glow"></div>

    <!-- 背景音乐 -->
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
    </audio>

    <!-- 手机悬浮音乐控制按钮 -->
    <div id="music-btn" class="music-btn hide">
        <span class="music-icon">🎵</span>
    </div>

    <!-- 1. 手机封面入口页 -->
    <div id="welcome-screen" class="welcome-screen">
        <div class="welcome-content">
            <div class="envelope-icon">✉️</div>
            <h2 id="welcome-title">亲爱的 CCMC 伙伴</h2>
            <p>我们为您准备了一份专属的记忆贺卡</p>
            <button id="open-btn" class="open-btn">点击开启惊喜</button>
        </div>
    </div>

    <!-- 2. 手机专属卡片页 -->
    <div id="card-screen" class="card-container hide">
        <!-- 照片区域 -->
        <div class="image-box">
            <img id="friend-img" src="" alt="纪念照片">
        </div>

        <!-- 祝福文字区域 -->
        <div class="content-box">
            <h1 id="friend-name"></h1>
            <p id="friend-role" class="role-tag"></p>
            
            <div class="divider"></div>

            <p id="blessing-text" class="message"></p>
            
            <div class="footer-sign">
                <p>—— 来自 CCMC 的全体伙伴</p>
            </div>
        </div>
    </div>

    <!-- 引入脚本 -->
    <script src="script.js"></script>
</body>
</html>
